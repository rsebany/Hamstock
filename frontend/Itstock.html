<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HamStock</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>

<style>

*,
*::before,
*::after{
box-sizing:border-box;
margin:0;
padding:0;
}

:root{
--blue:#1972B6;
--blue-dark:#1972B6;
--white:#ffffff;
--text-dark:#2C7CB8;
--text-body:#010815;
}

html,body{
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:#b4b9bf;
font-family:'Nunito',sans-serif;
}

/* PHONE FRAME */

.phone{
width:390px;
height:780px;
background:var(--white);
border-radius:40px;
box-shadow:0 30px 80px rgba(0,0,0,0.18),0 4px 16px rgba(0,0,0,0.08);
overflow:hidden;
display:flex;
flex-direction:column;
}

/* TOP BLUE SECTION */

.hero{
background:var(--blue);
height:200px;
position:relative;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.hero::after{
content:'';
position:absolute;
bottom:-2px;
left:-5%;
width:110%;
height:90px;
background:var(--white);
border-radius:55% 55% 0 0 / 80px 80px 0 0;
}

/* LOGO */

.mascot-wrap{
position:relative;
z-index:2;
display:flex;
justify-content:center;
align-items:center;
animation:floatUp 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
}

.logo {
  width: 130px;
  height: 130px;
  border-radius: 85%;       /* Perfect circle */
  border:  #1972B6; /* Visible border in your theme blue */
 /* White background behind logo */
}

/* CONTENT */

.content{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
padding:32px 36px 0 36px;
text-align:center;
}

.title{
font-size:42px;
font-weight:800;
color:var(--text-dark);
line-height:1.15;
letter-spacing:-0.5px;
animation:fadeSlideUp 0.6s 0.2s both;
}

.tagline{
margin-top:28px;
font-size:20px;
font-weight:800;
color:var(--text-dark);
animation:fadeSlideUp 0.6s 0.35s both;
}

.description{
margin-top:10px;
font-size:18px;
font-weight:500;
color:var(--text-body);
line-height:1.6;
animation:fadeSlideUp 0.6s 0.45s both;
}

.spacer{
flex:1;
}

/* BUTTON */

.btn{
width:80%;
padding:18px;
background:var(--blue);
color:white;
font-family:'Nunito',sans-serif;
font-size:20px;
font-weight:700;
border:none;
border-radius: 30px;
cursor:pointer;
letter-spacing:0.3px;
transition:0.2s;
box-shadow:0 6px 20px rgba(41,128,217,0.38);
margin-bottom:40px;
animation:fadeSlideUp 0.6s 0.55s both;
}

.btn:hover{
background:var(--blue-dark);
transform:translateY(-2px);
box-shadow:0 10px 28px rgba(41,128,217,0.45);
}

.btn:active{
transform:translateY(0);
box-shadow:0 4px 12px rgba(41,128,217,0.3);
}

/* ANIMATIONS */

@keyframes floatUp{
from{
opacity:0;
transform:translateY(30px) scale(0.85);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

@keyframes fadeSlideUp{
from{
opacity:0;
transform:translateY(18px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="phone">

<!-- HERO -->

<div class="hero">
<div class="mascot-wrap">
<img src="logo.png" alt="Logo HamStock" class="logo">
</div>
</div>

<!-- CONTENT -->

<div class="content">

<div class="title">
Welcome To<br>HamStock
</div>

<p class="tagline">
Store better. Waste less. Save more!
</p>

<p class="description">
Our app helps you organize your food,<br>
manage storage, and avoid expiration.
</p>

<div class="spacer"></div>

<button class="btn" onclick="handleContinue()">
Continue
</button>

<!-- SIMPLE DASHBOARD -->
<div id="dashboard" style="display:none; width:100%; margin-top:24px; text-align:left;">
  <h3 style="color:#2C7CB8; font-size:20px; margin-bottom:8px;">Live Warehouse Status</h3>
  <p style="font-size:14px; margin-bottom:12px;">
    Login, then we fetch data from the HamStock API.
  </p>

  <div id="shelf-status" style="margin-bottom:16px;">
    <!-- Filled from API -->
  </div>

  <div id="sensor-status" style="font-size:14px;">
    <!-- Filled from API -->
  </div>
</div>

</div>
</div>

<script>
const API_BASE = 'http://localhost:3000/api';

async function login(username, password){
  const res = await fetch(API_BASE + '/auth/login', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ username, password })
  });
  if(!res.ok){
    throw new Error('Login failed');
  }
  const data = await res.json();
  localStorage.setItem('hamstock_token', data.access_token);
}

async function fetchJson(path){
  const token = localStorage.getItem('hamstock_token');
  const headers = { 'Content-Type':'application/json' };
  if(token){
    headers['Authorization'] = 'Bearer ' + token;
  }
  const res = await fetch(API_BASE + path, { headers });
  if(!res.ok){
    throw new Error('Request failed: ' + path);
  }
  return res.json();
}

function renderShelves(shelves){
  const container = document.getElementById('shelf-status');
  if(!shelves || !shelves.length){
    container.innerHTML = '<p>No shelf data yet.</p>';
    return;
  }

  container.innerHTML = shelves.map(s => {
    const color = s.alert ? '#ff4d4f' : (s.status === 'PRODUCT PRESENT' ? '#52c41a' : '#faad14');
    return `
      <div style="border-radius:12px; padding:8px 10px; margin-bottom:8px; background:#f4f6fb;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <strong style="color:#2C7CB8;">${s.shelfId}</strong>
          <span style="color:${color}; font-weight:700;">${s.status}</span>
        </div>
        <div style="font-size:12px; margin-top:4px;">
          Distance: ${s.distance.toFixed(1)} cm • Alert: ${s.alert ? 'YES' : 'NO'}
        </div>
      </div>
    `;
  }).join('');
}

function renderSensor(sensor){
  const container = document.getElementById('sensor-status');
  if(!sensor){
    container.innerHTML = '<p>No sensor readings yet.</p>';
    return;
  }
  container.innerHTML = `
    <h4 style="color:#2C7CB8; margin-bottom:4px;">Environment (Zone ${sensor.zoneId})</h4>
    <p>Temperature: ${sensor.temperature.toFixed(1)} °C</p>
    <p>Humidity: ${sensor.humidity.toFixed(1)} %</p>
  `;
}

async function loadDashboard(){
  const dash = document.getElementById('dashboard');
  dash.style.display = 'block';

  try{
    const [shelves, sensor] = await Promise.all([
      fetchJson('/warehouse/status'),
      fetchJson('/warehouse/sensors/latest/1').catch(() => null)
    ]);
    renderShelves(shelves);
    if(sensor){
      renderSensor(sensor);
    }
  } catch(err){
    console.error(err);
  }
}

async function handleContinue(){
  const btn = document.querySelector('.btn');
  btn.textContent = 'Loading...';
  btn.style.background = '#1a5fa8';

  try{
    let token = localStorage.getItem('hamstock_token');
    if(!token){
      const username = prompt('Username:');
      const password = prompt('Password:');
      if(username && password){
        await login(username, password);
      }
    }
    await loadDashboard();
  } catch(err){
    alert('Could not login or load data. Check backend is running.');
    console.error(err);
  } finally{
    btn.textContent = 'Continue';
    btn.style.background = '';
  }
}
</script>

</body>
</html>
